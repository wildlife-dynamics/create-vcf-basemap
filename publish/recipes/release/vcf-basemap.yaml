context:
  name: vcf-basemap
  version: ${{ env.get("HATCH_VCS_VERSION") }}

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  path: ../../..  # repo root

build:
  noarch: python
  script: SETUPTOOLS_SCM_PRETEND_VERSION=${{ version }} python -m pip install . -vv --no-deps
  number: 0

requirements:
  host:
    - python
    - hatchling
    - hatch-vcs
    - pip
  run:
    - python
    - earthengine-api >=0.1.370

about:
  license: BSD-3-Clause

extra:
  recipe-maintainers:
    - Rodneyomukuti
